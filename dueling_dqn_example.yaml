behaviors:
  BasicDQN:
    trainer_type: dueling_dqn
    max_steps: 10000
    time_horizon: 10
    summary_freq: 1000
    keep_checkpoints: 5

    hyperparameters:
      learning_rate: 0.0003
      learning_rate_schedule: constant
      batch_size: 64
      buffer_size: 50000
      tau: 0.005
      steps_per_update: 4.0

      exploration_schedule: linear
      exploration_initial_eps: 0.1
      exploration_final_eps: 0.05
      exploration_steps: 1000

    network_settings:
      normalize: false
      hidden_units: 20
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0